# note: this file is not named alfresco-global.properties to not override the default file in the image
# instead it relies on Dockerfile post-processing to merge with the default file

db.driver=org.postgresql.Driver
db.url=jdbc:postgresql://postgres:5432/alfresco
db.username=alfresco
db.password=alfresco

index.subsystem.name=${docker.tests.search.subsystem}
solr.host=${docker.tests.search.internalHost}
solr.port=${docker.tests.search.internalPort}

csrf.filter.enabled=false

messaging.broker.url=vm://localhost?broker.persistent=false

transform.service.enabled=false
local.transform.service.enabled=false
