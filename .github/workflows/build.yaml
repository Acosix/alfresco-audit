name: Java CI

on:
  push:
    paths-ignore:
      - '*.md'
      - '**/*.md'
    branches:
      - '*'
    tags:
      - '*'
  pull_request:
    branches:
      - master

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: temurin
          cache: maven
      - run: mvn -version
      - run: mvn --batch-mode --update-snapshots verify